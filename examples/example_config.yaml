# HEARTY no longer uses YAML config files.
# Keep settings directly on the command line instead.
#
# Example:
# python3 hearty.py \
#   -b /path/to/your/sample.bam \
#   -o sample01 \
#   -d results \
#   -m 10 \
#   -t 0.15 \
#   -R 0.2 \
#   -c 8 \
#   --reuse-existing
#
# Optional region-restricted run:
# python3 hearty.py -b /path/to/your/sample.bam -o sample01 -r "chr1:1-50000000"
